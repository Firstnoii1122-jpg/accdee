<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รีเซ็ตรหัสผ่าน — Accdee</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .logo span { color: #6366f1; }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 14px;
      color: #e2e8f0;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #6366f1; }

    .msg {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }
    .msg.error   { display: block; background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
    .msg.success { display: block; background: #052e16; color: #86efac; border: 1px solid #14532d; }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover   { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .back-link {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
    }
    .back-link a {
      color: #6366f1;
      text-decoration: none;
      cursor: pointer;
    }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card" id="cardForm">
  <div class="logo">ACC<span>DEE</span></div>
  <p class="subtitle">ตั้งรหัสผ่านใหม่</p>

  <div class="form-group">
    <label>รหัสผ่านใหม่</label>
    <input type="password" id="newPassword" placeholder="อย่างน้อย 6 ตัวอักษร">
  </div>
  <div class="form-group">
    <label>ยืนยันรหัสผ่าน</label>
    <input type="password" id="confirmPassword" placeholder="กรอกรหัสผ่านอีกครั้ง">
  </div>

  <div class="msg" id="msg"></div>

  <button class="btn" id="submitBtn" onclick="doReset()">เปลี่ยนรหัสผ่าน</button>
  <p class="back-link"><a href="/">← กลับหน้าหลัก</a></p>
</div>

<script>
  const API_URL = '/api';
  const params  = new URLSearchParams(window.location.search);
  const token   = params.get('token');

  // ถ้าไม่มี token ใน URL ให้แสดงข้อความทันที
  if (!token) {
    showMsg('ลิงก์ไม่ถูกต้องหรือหมดอายุแล้ว กรุณาขอลิงก์ใหม่', 'error');
    document.getElementById('submitBtn').disabled = true;
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className   = `msg ${type}`;
  }

  async function doReset() {
    const newPassword     = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (!newPassword || !confirmPassword) {
      showMsg('กรุณากรอกรหัสผ่านให้ครบ', 'error');
      return;
    }
    if (newPassword.length < 6) {
      showMsg('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', 'error');
      return;
    }
    if (newPassword !== confirmPassword) {
      showMsg('รหัสผ่านทั้งสองช่องไม่ตรงกัน', 'error');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled    = true;
    btn.textContent = 'กำลังบันทึก...';

    try {
      const res  = await fetch(`${API_URL}/auth/reset-password`, {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ token, password: newPassword })
      });
      const data = await res.json();

      if (data.success) {
        showMsg('✅ เปลี่ยนรหัสผ่านสำเร็จ! กำลังพาไปหน้าหลัก...', 'success');
        setTimeout(() => { window.location.href = '/'; }, 2500);
      } else {
        showMsg(data.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่', 'error');
        btn.disabled    = false;
        btn.textContent = 'เปลี่ยนรหัสผ่าน';
      }
    } catch (err) {
      showMsg('ไม่สามารถเชื่อมต่อได้ กรุณาลองใหม่', 'error');
      btn.disabled    = false;
      btn.textContent = 'เปลี่ยนรหัสผ่าน';
    }
  }

  // กด Enter ได้เลย
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doReset();
  });
</script>

</body>
</html>
