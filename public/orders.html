<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACCDEE — ประวัติการซื้อ</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo { font-size: 20px; font-weight: 700; color: #a78bfa; text-decoration: none; }
    .nav-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .nav-balance { font-size: 14px; color: #10b981; font-weight: 600; }
    .nav-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      display: inline-block;
    }
    .btn-outline { background: transparent; border: 1px solid #475569; color: #e2e8f0; }
    .btn-primary { background: #6d28d9; color: #fff; }
    .btn-active  { background: transparent; border: 1px solid #a78bfa; color: #a78bfa; }
    .btn-primary:hover { background: #7c3aed; }
    .btn-outline:hover { border-color: #a78bfa; color: #a78bfa; }

    /* MAIN */
    main { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

    h1 { font-size: 22px; margin-bottom: 8px; color: #f1f5f9; }
    .subtitle { font-size: 14px; color: #64748b; margin-bottom: 28px; }

    /* ORDER LIST */
    .order-list { display: flex; flex-direction: column; gap: 16px; }

    .order-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px 24px;
      transition: border-color .2s;
    }
    .order-card:hover { border-color: #6d28d9; }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .order-name  { font-size: 16px; font-weight: 600; color: #f1f5f9; }
    .order-meta  { font-size: 12px; color: #64748b; margin-top: 4px; }
    .order-amount {
      font-size: 18px;
      font-weight: 700;
      color: #ef4444;
      white-space: nowrap;
    }

    .cred-label { font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
    .cred-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 14px;
      font-family: monospace;
      font-size: 13px;
      color: #10b981;
      word-break: break-all;
      white-space: pre-wrap;
      cursor: pointer;
      position: relative;
      transition: border-color .2s;
    }
    .cred-box:hover { border-color: #10b981; }
    .cred-box::after {
      content: '📋 Copy';
      position: absolute;
      top: 8px;
      right: 10px;
      font-family: 'Sarabun', sans-serif;
      font-size: 11px;
      color: #64748b;
    }

    /* EMPTY / LOADING */
    .empty {
      text-align: center;
      padding: 80px 0;
      color: #64748b;
      font-size: 15px;
      line-height: 2;
    }
    .empty a {
      color: #a78bfa;
      text-decoration: none;
      font-weight: 600;
    }
    .empty a:hover { text-decoration: underline; }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      z-index: 300;
    }
    #toast.show { display: block; }
    #toast.success { background: #10b981; color: #fff; }
    #toast.error   { background: #ef4444; color: #fff; }

    /* ORDER ID badge */
    .order-id {
      display: inline-block;
      background: #1e3a5f;
      color: #93c5fd;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }

    /* NO CREDENTIALS — contact box */
    .no-cred-box {
      background: #2d1b00;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      padding: 14px 16px;
    }
    .no-cred-title {
      font-size: 13px;
      font-weight: 600;
      color: #fbbf24;
      margin-bottom: 6px;
    }
    .no-cred-desc {
      font-size: 12px;
      color: #d97706;
      margin-bottom: 12px;
      line-height: 1.6;
    }
    .contact-btns { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-line {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: #06c755;
      color: #fff;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      font-family: 'Sarabun', sans-serif;
      transition: background .2s;
    }
    .btn-line:hover { background: #05a847; }
    .btn-tg {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: #229ed9;
      color: #fff;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      font-family: 'Sarabun', sans-serif;
      transition: background .2s;
    }
    .btn-tg:hover { background: #1a87bb; }

    /* CONTACT BANNER */
    .contact-banner {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .contact-banner-text { font-size: 13px; color: #94a3b8; }
    .contact-banner-text b { color: #e2e8f0; }
    .contact-banner-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">ACC<span style="color:#c4b5fd">DEE</span></a>
  <div class="nav-right">
    <span class="nav-balance" id="navBalance">฿ —</span>
    <a href="/shop.html"   class="nav-btn btn-outline">🛍️ ร้านค้า</a>
    <a href="/orders.html" class="nav-btn btn-active">📋 ประวัติซื้อ</a>
    <a href="/wallet.html" class="nav-btn btn-outline">💰 กระเป๋าเงิน</a>
    <a href="/faq.html"    class="nav-btn btn-outline">❓ FAQ</a>
    <a href="#" onclick="goTopup()" class="nav-btn btn-primary">+ เติมเงิน</a>
    <a href="#" onclick="doLogout()" class="nav-btn btn-outline">ออก</a>
  </div>
</nav>

<main>
  <h1>📋 ประวัติการซื้อ</h1>
  <p class="subtitle">รายการสินค้าที่คุณสั่งซื้อทั้งหมด (กดที่กล่องข้อมูลเพื่อ copy)</p>

  <!-- แบนเนอร์ติดต่อแอดมิน -->
  <div class="contact-banner">
    <div class="contact-banner-text">
      <b>มีปัญหาหรือสงสัย?</b> ติดต่อแอดมินได้เลย พร้อมแจ้งเลข Order #
    </div>
    <div class="contact-banner-btns">
      <a href="https://lin.ee/qpUaGmg" target="_blank" class="btn-line">
        <svg width="16" height="16" viewBox="0 0 40 40" fill="white"><path d="M20 2C10.06 2 2 9.16 2 18c0 7.98 6.5 14.6 15.3 15.8.6.13 1.4.4 1.6.9.2.44.13 1.13.06 1.58l-.26 1.53c-.08.47-.36 1.83 1.6 1 1.96-.84 10.6-6.24 14.46-10.67C37.12 24.9 38 21.56 38 18 38 9.16 29.94 2 20 2z"/></svg>
        LINE
      </a>
      <a href="https://t.me/TheonXbot" target="_blank" class="btn-tg">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.94 8.19l-2.02 9.52c-.15.67-.54.84-1.1.52l-3-2.21-1.45 1.4c-.16.16-.3.3-.61.3l.22-3.05 5.56-5.02c.24-.22-.05-.34-.37-.12L6.38 14.4l-2.94-.92c-.64-.2-.65-.64.13-.95l11.5-4.43c.53-.2 1 .13.87.09z"/></svg>
        Telegram
      </a>
    </div>
  </div>

  <div class="order-list" id="orderList">
    <div class="empty">กำลังโหลด...</div>
  </div>
</main>

<div id="toast"></div>

<script>
  const TOKEN_KEY = 'accdee_token';
  const USER_KEY  = 'accdee_user';

  function getToken() { return localStorage.getItem(TOKEN_KEY); }
  function getUser()  { return JSON.parse(localStorage.getItem(USER_KEY) || 'null'); }

  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    setTimeout(() => el.className = '', 3000);
  }

  async function api(method, path) {
    const res = await fetch('/api' + path, {
      method,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + getToken()
      }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'เกิดข้อผิดพลาด');
    return data;
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('th-TH', {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function copyCredentials(el, text) {
    navigator.clipboard.writeText(text)
      .then(() => toast('Copy สำเร็จแล้ว!'))
      .catch(() => toast('Copy ไม่ได้ กรุณา copy ด้วยตัวเอง', 'error'));
  }

  async function loadOrders() {
    const list = document.getElementById('orderList');
    try {
      const res    = await api('GET', '/shop/orders');
      const orders = res.data || [];

      if (!orders.length) {
        list.innerHTML = `
          <div class="empty">
            ยังไม่มีประวัติการซื้อ<br>
            <a href="/shop.html">ไปดูสินค้าได้เลย →</a>
          </div>`;
        return;
      }

      list.innerHTML = orders.map(o => {
        const creds   = String(o.credentials || '').trim();
        const hasCred = creds.length > 0;
        const lineMsg = encodeURIComponent(`สวัสดีครับ ผมสั่งซื้อ Order #${o.id} (${o.product_name}) แต่ไม่ได้รับข้อมูลบัญชี กรุณาตรวจสอบให้ด้วยครับ`);
        const tgMsg   = encodeURIComponent(`สวัสดีครับ Order #${o.id} (${o.product_name}) ไม่ได้รับข้อมูลบัญชีครับ`);

        const credSection = hasCred
          ? `<div class="cred-label">📋 ข้อมูลบัญชีที่ได้รับ (คลิกเพื่อ copy)</div>
             <div class="cred-box" onclick="copyCredentials(this, ${JSON.stringify(creds)})">${esc(creds)}</div>`
          : `<div class="no-cred-box">
               <div class="no-cred-title">⚠️ ยังไม่ได้รับข้อมูลบัญชี</div>
               <div class="no-cred-desc">
                 กรุณาติดต่อแอดมินพร้อมแจ้งเลข <b>Order #${o.id}</b><br>
                 เพื่อให้แอดมินส่งข้อมูลบัญชีให้คุณโดยเร็ว
               </div>
               <div class="contact-btns">
                 <a href="https://lin.ee/qpUaGmg" target="_blank" class="btn-line">
                   <svg width="14" height="14" viewBox="0 0 40 40" fill="white"><path d="M20 2C10.06 2 2 9.16 2 18c0 7.98 6.5 14.6 15.3 15.8.6.13 1.4.4 1.6.9.2.44.13 1.13.06 1.58l-.26 1.53c-.08.47-.36 1.83 1.6 1 1.96-.84 10.6-6.24 14.46-10.67C37.12 24.9 38 21.56 38 18 38 9.16 29.94 2 20 2z"/></svg>
                   ติดต่อ LINE
                 </a>
                 <a href="https://t.me/TheonXbot?text=${tgMsg}" target="_blank" class="btn-tg">
                   <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.94 8.19l-2.02 9.52c-.15.67-.54.84-1.1.52l-3-2.21-1.45 1.4c-.16.16-.3.3-.61.3l.22-3.05 5.56-5.02c.24-.22-.05-.34-.37-.12L6.38 14.4l-2.94-.92c-.64-.2-.65-.64.13-.95l11.5-4.43c.53-.2 1 .13.87.09z"/></svg>
                   ติดต่อ Telegram
                 </a>
               </div>
             </div>`;

        return `
          <div class="order-card">
            <div class="order-header">
              <div>
                <div class="order-name">${esc(o.product_name)}</div>
                <div class="order-meta">
                  <span class="order-id">#${o.id}</span>
                  &nbsp;${formatDate(o.created_at)}
                </div>
              </div>
              <div class="order-amount">-฿${parseFloat(o.amount).toFixed(2)}</div>
            </div>
            ${credSection}
            <div id="review-${o.id}" style="margin-top:12px">
              <div style="font-size:12px;color:#64748b;margin-bottom:6px">ให้คะแนนสินค้านี้:</div>
              <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
                ${[1,2,3,4,5].map(s => `<button onclick="submitReview(${o.id},${s},this.closest('[id]'))" style="background:#1e3a5f;border:1px solid #334155;color:#fbbf24;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:16px;font-family:inherit">★ ${s}</button>`).join('')}
              </div>
            </div>
          </div>`;
      }).join('');

    } catch (err) {
      list.innerHTML = `<div class="empty" style="color:#ef4444">โหลดประวัติไม่ได้: ${err.message}</div>`;
    }
  }

  async function submitReview(orderId, rating, container) {
    try {
      const res  = await fetch(`/api/shop/orders/${orderId}/review`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
        body: JSON.stringify({ rating })
      });
      const data = await res.json();
      if (data.success) {
        container.innerHTML = `<div style="font-size:13px;color:#10b981">★ ${'★'.repeat(rating)} ขอบคุณสำหรับรีวิวครับ!</div>`;
      } else {
        toast(data.message, 'error');
      }
    } catch { toast('เกิดข้อผิดพลาด', 'error'); }
  }

  async function refreshBalance() {
    const token = getToken();
    const user  = getUser();
    if (!token || !user) return;
    try {
      const res  = await fetch('/api/wallet/info', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!res.ok) return;
      const data = await res.json();
      if (!data.success) return;
      const newBalance = parseFloat(data.data.balance || 0).toFixed(2);
      user.balance = newBalance;
      localStorage.setItem(USER_KEY, JSON.stringify(user));
      document.getElementById('navBalance').textContent = '฿ ' + newBalance;
    } catch { /* silent */ }
  }

  function goTopup() { location.href = '/'; }

  function doLogout() {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(USER_KEY);
    location.href = '/';
  }

  // เช็ค login
  const token = getToken();
  const user  = getUser();
  if (!token || !user) {
    location.href = '/';
  } else {
    document.getElementById('navBalance').textContent = '฿ ' + parseFloat(user.balance || 0).toFixed(2);
    refreshBalance();
    loadOrders();
    setInterval(refreshBalance, 30000);
  }
</script>

</body>
</html>
