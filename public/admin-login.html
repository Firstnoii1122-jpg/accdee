<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACCDEE — Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin-login.css">
</head>
<body>

  <div class="login-card">
    <div class="login-logo">
      <div class="badge-circle">🛡️</div>
      <h1>ACC<span style="color:#7c3aed">DEE</span> Admin</h1>
      <p>เข้าสู่ระบบเพื่อจัดการเว็บไซต์</p>
    </div>

    <div id="errorBox" class="error-box"></div>

    <form id="loginForm" autocomplete="on" novalidate>
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email Admin</label>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input
            id="loginEmail"
            type="email"
            class="form-control with-icon"
            placeholder="admin@accdee.shop"
            autocomplete="email"
            required
            autofocus>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="loginPassword">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input
            id="loginPassword"
            type="password"
            class="form-control with-icon"
            placeholder="••••••••"
            autocomplete="current-password"
            required>
          <button type="button" id="togglePw" class="toggle-pw">👁</button>
        </div>
      </div>

      <button type="submit" id="submitBtn" class="btn-login">เข้าสู่ระบบ</button>

      <div class="login-helpers">
        <span>ACCDEE v1.0</span>
        <a href="/">← กลับหน้าหลัก</a>
      </div>
    </form>

    <!-- OTP Step — แสดงหลัง login สำเร็จสำหรับ Admin -->
    <div id="otpStep" style="display:none">
      <p style="color:#a0aec0;font-size:13px;margin-bottom:16px;text-align:center">
        🔐 ส่งรหัส OTP ไปที่ Email ของคุณแล้ว (หมดอายุใน 5 นาที)
      </p>
      <div class="form-group">
        <label class="form-label" for="otpInput">รหัส OTP 6 หลัก</label>
        <div class="input-wrap">
          <span class="input-icon">🔑</span>
          <input
            id="otpInput"
            type="text"
            class="form-control with-icon"
            placeholder="000000"
            maxlength="6"
            inputmode="numeric"
            autocomplete="one-time-code"
            autofocus>
        </div>
      </div>
      <button type="button" id="otpBtn" class="btn-login">ยืนยัน OTP</button>
      <div style="text-align:center;margin-top:12px">
        <a href="/admin-login.html" style="color:#7c3aed;font-size:13px">← กลับหน้า Login</a>
      </div>
    </div>

    <div class="login-footer">
      © 2026 ACCDEE · Admin Portal · Secure Login
    </div>
  </div>

  <script src="js/admin-config.js"></script>
  <script src="js/admin-api.js"></script>
  <script src="js/admin-login.js"></script>
</body>
</html>
